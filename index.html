<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTU Interface Final</title>

<style>
:root{
  --bg:#050507;
  --panel:#0c0c12;
  --border:#1f1f2a;
  --purple:#a970ff;
  --green:#00e6a3;
  --text:#e4e4e7;
  --muted:#9a9aa3;
}

@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');

*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'JetBrains Mono','Courier New',monospace;
}

button, .card, .title, .log, .caption {
  font-family:'JetBrains Mono','Courier New',monospace;
}

button{
  border-radius:10px;
  border:1px solid var(--border);
  background:linear-gradient(to bottom,rgba(255,255,255,0.03),transparent);
  color:var(--muted);
  padding:10px;
  transition:0.2s;
  cursor:pointer;
}
button:hover{
  color:var(--purple);
  border-color:var(--purple);
  background:rgba(169,112,255,0.12);
}

.container{max-width:900px;margin:auto;padding:18px}

.nav{display:flex;gap:8px;margin-bottom:18px}
.nav button{
  flex:1;padding:12px;
}
.nav button.active{
  color:var(--purple);
  border-color:var(--purple);
  background:rgba(169,112,255,0.12);
}

.panel{display:none;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px}
.panel.active{display:block}

.title{color:var(--purple);font-size:12px;margin-bottom:10px}
.highlight{color:var(--green)}
.muted{color:var(--muted)}

.hero h1{margin:0;color:var(--green);font-size:22px}
.hero p{margin-top:6px;color:var(--muted)}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.card{border:1px solid var(--border);padding:14px;border-radius:10px;background:rgba(255,255,255,0.02)}

img{width:100%;border-radius:8px;margin-top:10px;cursor:pointer}

.captionRow{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:var(--muted);
  margin-bottom:12px;
}

.archiveItem{
  position:relative;
}

.editIcon{
  position:absolute;
  top:10px;
  right:10px;
  opacity:0;
  cursor:pointer;
  font-weight:bold;
}

.archiveItem:hover .editIcon{
  opacity:1;
}

.fullscreen{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}
.fullscreen img{
  max-width:90%;
  max-height:90%;
}
</style>
</head>

<body>

<div class="container">

<div class="nav">
  <button class="active" onclick="tab('home',this)">Home</button>
  <button onclick="tab('system',this)">System</button>
  <button onclick="tab('archive',this)">Archive</button>
  <button onclick="tab('logs',this)">Logs</button>
  <button onclick="tab('capsule',this)">Capsule</button>
  <button onclick="tab('profile',this)">Profile</button>
</div>

<div id="home" class="panel active">
  <div class="hero">
    <h1>ASTU MECHANICAL INTERFACE</h1>
    <p>Batch archive and final phase access system</p>
  </div>
</div>

<div id="system" class="panel">
  <div class="title">SYSTEM STATUS</div>
</div>

<div id="archive" class="panel">
  <div class="title">ARCHIVE</div>

  <input type="file" id="imageInput" style="display:none" accept="image/*">
  <button id="uploadBtn">+ Add Photo</button>

  <textarea id="captionInput" placeholder="Add caption (optional)..." style="display:none"></textarea>
  <button id="postImageBtn" style="display:none;margin-top:8px;">POST</button>

  <div id="uploadStatus" class="muted"></div>
  <div id="archiveContainer"></div>
</div>

</div>

<script>
function tab(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'))
  document.getElementById(id).classList.add('active')
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"astu-mechanical-portal.firebaseapp.com",
  projectId:"astu-mechanical-portal"
});

const auth=getAuth(app);
const db=getFirestore(app);
const provider=new GoogleAuthProvider();

uploadBtn.onclick=()=> imageInput.click();

postImageBtn.onclick=async ()=>{
  uploadStatus.innerHTML="Uploading...";
  postImageBtn.style.display="none";

  const fd=new FormData();
  fd.append("file",imageInput.files[0]);
  fd.append("upload_preset","astu_upload");

  const res=await fetch("https://api.cloudinary.com/v1_1/djo2lhxqm/image/upload",{method:"POST",body:fd});
  const data=await res.json();

  await addDoc(collection(db,"archive"),{
    image:data.secure_url,
    caption:captionInput.value,
    user:auth.currentUser.displayName,
    uid:auth.currentUser.uid
  });

  uploadStatus.innerHTML="";
  captionInput.style.display="none";
  loadArchive();
};

imageInput.onchange=()=>{
  captionInput.style.display="block";
  postImageBtn.style.display="block";
};

function openFullscreen(src){
  const div=document.createElement("div");
  div.className="fullscreen";
  div.innerHTML=`<img src="${src}">`;
  div.onclick=()=>div.remove();
  document.body.appendChild(div);
}

async function loadArchive(){
  const snap=await getDocs(collection(db,"archive"));
  archiveContainer.innerHTML="";

  snap.forEach(d=>{
    const data=d.data();
    const isOwner=auth.currentUser && auth.currentUser.uid===data.uid;

    archiveContainer.innerHTML+=`
    <div class="archiveItem">
      ${isOwner ? `<div class="editIcon" onclick="editPost('${d.id}','${data.caption}')">✎</div>` : ""}
      <img src="${data.image}" onclick="openFullscreen('${data.image}')">

      <div id="view-${d.id}">
        <div class="captionRow">
          <span>${data.caption||""}</span>
          <span>${data.user}</span>
        </div>
      </div>

      <div id="edit-${d.id}" style="display:none">
        <textarea id="editInput-${d.id}">${data.caption||""}</textarea>
        <button onclick="saveEdit('${d.id}')">SAVE</button>
        <button onclick="deletePost('${d.id}')">DELETE POST</button>
      </div>
    </div>`;
  });
}

window.editPost=(id)=>{
  document.getElementById(`view-${id}`).style.display="none";
  document.getElementById(`edit-${id}`).style.display="block";
};

window.saveEdit=async(id)=>{
  const val=document.getElementById(`editInput-${id}`).value;
  await updateDoc(doc(db,"archive",id),{caption:val});
  loadArchive();
};

window.deletePost=async(id)=>{
  await deleteDoc(doc(db,"archive",id));
  loadArchive();
};

onAuthStateChanged(auth,loadArchive);
</script>

</body>
</html>
