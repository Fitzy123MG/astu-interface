<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTU Interface Final</title>

<style>
:root{
  --bg:#050507;
  --panel:#0c0c12;
  --border:#1f1f2a;
  --purple:#a970ff;
  --green:#00e6a3;
  --text:#e4e4e7;
  --muted:#9a9aa3;
}

@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');

*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'JetBrains Mono','Courier New',monospace;
}

button{
  border-radius:10px;
  border:1px solid var(--border);
  background:linear-gradient(to bottom,rgba(255,255,255,0.03),transparent);
  color:var(--muted);
  padding:10px;
  cursor:pointer;
}

.container{max-width:900px;margin:auto;padding:18px}

.nav{display:flex;gap:8px;margin-bottom:18px}
.nav button{flex:1;padding:12px}
.nav button.active{
  color:var(--purple);
  border-color:var(--purple);
  background:rgba(169,112,255,0.12);
}

.panel{display:none;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px}
.panel.active{display:block}

.title{color:var(--purple);font-size:12px;margin-bottom:10px}
.highlight{color:var(--green)}
.muted{color:var(--muted)}

.hero h1{margin:0;color:var(--green);font-size:22px}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.card{border:1px solid var(--border);padding:14px;border-radius:10px;background:rgba(255,255,255,0.02)}

textarea{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  background:#0b0b11;
  color:var(--text);
  border:1px solid var(--border);
}

.log{padding:8px 0;border-bottom:1px solid var(--border)}

img{width:100%;border-radius:8px;margin-top:10px}

#uploadBtn{
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="nav">
  <button class="active" onclick="tab('home',this)">Home</button>
  <button onclick="tab('system',this)">System</button>
  <button onclick="tab('archive',this)">Archive</button>
  <button onclick="tab('logs',this)">Logs</button>
  <button onclick="tab('capsule',this)">Capsule</button>
  <button onclick="tab('profile',this)">Profile</button>
</div>

<div id="home" class="panel active">
  <div class="hero">
    <h1>ASTU MECHANICAL INTERFACE</h1>
  </div>
</div>

<div id="system" class="panel">
  <div class="title">SYSTEM STATUS</div>
  <div class="highlight">UNIVERSITY COMPLETION: 50%</div>
  <div class="muted">STATUS: FINAL PHASE</div>
</div>

<div id="archive" class="panel">
  <div class="title">ARCHIVE</div>

  <input type="file" id="imageInput" style="display:none" accept="image/*">
  <button id="uploadBtn">+</button>

  <div id="archiveContainer"></div>
</div>

<div id="logs" class="panel">
  <div class="title">LOG ENTRIES</div>
  <textarea id="logInput"></textarea>
  <button id="logBtn">POST</button>
  <div id="logsContainer"></div>
</div>

<div id="capsule" class="panel">
  <div class="title">TIME CAPSULE</div>
  <button onclick="tryAccess()">UNLOCK</button>
  <div id="status"></div>
</div>

<div id="profile" class="panel">
  <div id="userInfo">NOT LOGGED IN</div>
  <button id="loginBtn">LOGIN</button>
  <button id="logoutBtn" style="display:none">LOGOUT</button>
</div>

</div>

<script>
function tab(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'))
  document.getElementById(id).classList.add('active')
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithPopup, signOut, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  authDomain: "astu-mechanical-portal.firebaseapp.com",
  projectId: "astu-mechanical-portal"
});

const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

loginBtn.onclick = () => signInWithPopup(auth, provider);
logoutBtn.onclick = () => signOut(auth);

onAuthStateChanged(auth, (user)=>{
  if(user){
    userInfo.innerHTML = user.displayName;
    loginBtn.style.display="none";
    logoutBtn.style.display="block";
  } else {
    userInfo.innerHTML="NOT LOGGED IN";
    loginBtn.style.display="block";
    logoutBtn.style.display="none";
  }
  loadArchive();
});

uploadBtn.onclick = ()=>{
  if(!auth.currentUser) return alert("Login first");
  imageInput.click();
};

imageInput.onchange = async ()=>{
  const file = imageInput.files[0];
  if(!file) return;

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "astu_upload");

  const res = await fetch("https://api.cloudinary.com/v1_1/djo2lhxqm/image/upload", {
    method:"POST",
    body:formData
  });

  const data = await res.json();

  await addDoc(collection(db,"archive"),{
    image:data.secure_url,
    user:auth.currentUser.displayName
  });

  loadArchive();
};

async function loadArchive(){
  const snap = await getDocs(collection(db,"archive"));
  archiveContainer.innerHTML="";
  snap.forEach(d=>{
    archiveContainer.innerHTML += `<img src="${d.data().image}">`;
  });
}
</script>

</body>
</html>
