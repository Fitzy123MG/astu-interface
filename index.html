<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTU Interface Final</title>

<style>
:root{
  --bg:#050507;
  --panel:#0c0c12;
  --border:#1f1f2a;
  --purple:#a970ff;
  --green:#00e6a3;
  --text:#e4e4e7;
  --muted:#9a9aa3;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Courier New',monospace;
}

.container{max-width:900px;margin:auto;padding:18px}

.nav{display:flex;gap:8px;margin-bottom:18px}
.nav button{
  flex:1;padding:12px;border-radius:10px;
  border:1px solid var(--border);
  background:#0b0b11;
  color:var(--muted);
}
.nav button.active{
  color:var(--purple);
  border-color:var(--purple);
}

.panel{display:none;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px}
.panel.active{display:block}

.title{color:var(--purple);font-size:12px;margin-bottom:10px}
.highlight{color:var(--green)}
.muted{color:var(--muted)}

img{width:100%;border-radius:8px;margin-top:10px}

input, textarea, button{
  background:#0b0b11;
  color:var(--text);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px;
  width:100%;
  margin-top:8px;
}

.plusBtn{
  width:36px;height:36px;border-radius:10px;
  border:1px solid var(--border);
  background:#0b0b11;color:var(--green);
}

.preview{
  margin-top:10px;
  max-height:200px;
}
</style>
</head>

<body>

<div class="container">

<div class="nav">
<button class="active" onclick="tab('home',this)">Home</button>
<button onclick="tab('system',this)">System</button>
<button onclick="tab('archive',this)">Archive</button>
<button onclick="tab('logs',this)">Logs</button>
<button onclick="tab('capsule',this)">Capsule</button>
<button onclick="tab('profile',this)">Profile</button>
</div>

<!-- HOME -->
<div id="home" class="panel active">
<h2>ASTU MECHANICAL INTERFACE</h2>
<p class="muted">Batch archive and final phase access system</p>
</div>

<!-- SYSTEM -->
<div id="system" class="panel">
<div class="title">SYSTEM STATUS</div>
<div class="highlight">UNIVERSITY COMPLETION: 50%</div>
<div class="muted">COHORT: ASTU MECHANICAL 2026</div>
<div class="muted">STATUS: FINAL PHASE</div>
</div>

<!-- ARCHIVE -->
<div id="archive" class="panel">
<div style="display:flex;justify-content:space-between;">
<div class="title">ARCHIVE</div>
<button onclick="toggleArchiveInput()" class="plusBtn">+</button>
</div>

<div id="archiveInputBox" style="display:none;">
<input type="file" id="imageInput" accept="image/*">
<img id="preview" class="preview" style="display:none;">
<textarea id="captionInput" placeholder="Caption..."></textarea>
<button id="uploadBtn">UPLOAD</button>
</div>

<div id="archiveContainer"></div>
</div>

<!-- LOGS -->
<div id="logs" class="panel">
<div style="display:flex;justify-content:space-between;">
<div class="title">LOG ENTRIES</div>
<button onclick="toggleLogInput()" class="plusBtn">+</button>
</div>

<div id="logInputBox" style="display:none;">
<textarea id="logInput" placeholder="Write a message..."></textarea>

<label class="muted">
<input type="checkbox" id="anonCheck"> Post as anonymous
</label>

<button id="logBtn">POST</button>
</div>

<div id="logsContainer" class="muted">wow, so empty...</div>
</div>

<!-- CAPSULE -->
<div id="capsule" class="panel">
<div class="title">TIME CAPSULE</div>
<button onclick="tryAccess()">UNLOCK</button>
<div id="status"></div>
<div id="countdown"></div>
<div id="content" style="display:none">FINAL WEEK</div>
</div>

<!-- PROFILE -->
<div id="profile" class="panel">
<div class="title">PROFILE</div>

<button id="loginBtn">LOGIN</button>
<div id="userInfo" class="highlight" style="margin-top:14px;">MUST LOGIN</div>
</div>

</div>

<script>
function tab(id,btn){
document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'))
document.getElementById(id).classList.add('active')
document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'))
btn.classList.add('active')
}

function toggleArchiveInput(){
archiveInputBox.style.display = archiveInputBox.style.display==='none'?'block':'none';
}

function toggleLogInput(){
logInputBox.style.display = logInputBox.style.display==='none'?'block':'none';
}

imageInput.onchange = () => {
const file = imageInput.files[0];
if(file){
preview.src = URL.createObjectURL(file);
preview.style.display='block';
}
};

const target=new Date("May 27, 2026 23:59:59").getTime()

function tryAccess(){
const now=Date.now()
const diff=target-now
const status=document.getElementById('status')

if(diff>0){
status.innerHTML="ACCESS DENIED"
} else {
status.innerHTML="ACCESS GRANTED"
document.getElementById('content').style.display='block'
}
}

setInterval(()=>{
const now=Date.now()
const diff=target-now
const el=document.getElementById('countdown')

if(diff<0){
el.innerHTML=""
return
}

const d=Math.floor(diff/86400000)
const h=Math.floor((diff%86400000)/3600000)
const m=Math.floor((diff%3600000)/60000)

el.innerHTML=`${d}d ${h}h ${m}m remaining`
},1000)
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey: "AIzaSyD...",
authDomain: "astu-mechanical-portal.firebaseapp.com",
projectId: "astu-mechanical-portal"
});

const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// LOGIN FIX (REDIRECT)
loginBtn.onclick = () => {
signInWithRedirect(auth, provider);
};

// HANDLE RETURN
getRedirectResult(auth).catch(console.error);

// USER STATE
onAuthStateChanged(auth, user=>{
userInfo.innerHTML = user ? "USER: "+user.displayName : "MUST LOGIN";
});

// LOG SAVE
logBtn.onclick = async ()=>{
const user = auth.currentUser;
if(!user) return alert("Login first");

await addDoc(collection(db,"logs"),{
text: logInput.value,
user: anonCheck.checked ? "Anonymous" : user.displayName
});

logInput.value="";
loadLogs();
};

// LOAD LOGS
async function loadLogs(){
const snap = await getDocs(collection(db,"logs"));

if(snap.empty){
logsContainer.innerHTML="wow, so empty...";
return;
}

logsContainer.innerHTML="";
snap.forEach(doc=>{
const d = doc.data();
logsContainer.innerHTML += `<div class="log">${d.text} — ${d.user}</div>`;
});
}

loadLogs();
</script>

</body>
</html>
