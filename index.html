<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTU Interface Final</title>

<style>
:root{
  --bg:#050507;
  --panel:#0c0c12;
  --border:#1f1f2a;
  --purple:#a970ff;
  --green:#00e6a3;
  --text:#e4e4e7;
  --muted:#9a9aa3;
} 

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Courier New',monospace;
}

.container{max-width:900px;margin:auto;padding:18px}

.nav{display:flex;gap:8px;margin-bottom:18px}
.nav button{
  flex:1;padding:12px;border-radius:10px;
  border:1px solid var(--border);
  background:#0b0b11;
  color:var(--muted);
}
.nav button.active{
  color:var(--purple);
  border-color:var(--purple);
}

.panel{display:none;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px}
.panel.active{display:block}

.title{color:var(--purple);font-size:12px;margin-bottom:10px}
.muted{color:var(--muted)}

img{width:100%;border-radius:8px;margin-top:10px}
.caption{font-size:12px;color:var(--muted)}

.log{padding:8px 0;border-bottom:1px solid var(--border)}
</style>
</head>

<body>

<div class="container">

<div class="nav">
  <button class="active" onclick="tab('home',this)">Home</button>
  <button onclick="tab('archive',this)">Archive</button>
  <button onclick="tab('logs',this)">Logs</button>
</div>

<div id="home" class="panel active">
  <h2>ASTU MECHANICAL INTERFACE</h2>

  <button id="loginBtn">LOGIN</button>
  <div id="userInfo" class="muted"></div>
</div>

<div id="archive" class="panel">
  <div class="title">ARCHIVE</div>

  <input type="file" id="imageInput"><br><br>
  <textarea id="captionInput" placeholder="Caption..."></textarea><br><br>
  <button id="uploadBtn">UPLOAD</button>

  <div id="archiveContainer"></div>
</div>

<div id="logs" class="panel">
  <div class="title">LOGS</div>

  <textarea id="logInput" placeholder="Write message..."></textarea><br><br>
  <button id="logBtn">POST</button>

  <div id="logsContainer"></div>
</div>

</div>

<script>
function tab(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'))
  document.getElementById(id).classList.add('active')
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'))
  btn.classList.add('active')
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD2eNBRZk6KVo1SqxxpgNdltWUVRJCfzAA",
  authDomain: "astu-mechanical-portal.firebaseapp.com",
  projectId: "astu-mechanical-portal",
  storageBucket: "astu-mechanical-portal.firebasestorage.app",
  messagingSenderId: "410719511999",
  appId: "1:410719511999:web:f8b2ce1d310709ff7fad0a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const provider = new GoogleAuthProvider();

// LOGIN
loginBtn.onclick = async () => {
  await signInWithPopup(auth, provider);
};

onAuthStateChanged(auth, (user) => {
  userInfo.innerHTML = user ? "USER: " + user.displayName : "NOT LOGGED IN";
});

// IMAGE UPLOAD (Cloudinary)
uploadBtn.onclick = async () => {
  const user = auth.currentUser;
  if (!user) return alert("Login first");

  const file = imageInput.files[0];
  const caption = captionInput.value;

  if (!file) return alert("Select image");

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "astu_upload");

  const res = await fetch("https://api.cloudinary.com/v1_1/djo2lhxqm/image/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  if (!data.secure_url) {
    alert("Upload failed");
    console.log(data);
    return;
  }
  await addDoc(collection(db, "posts"), {
    type: "image",
    imageUrl: data.secure_url,
    caption,
    approved: false
  });

  alert("Submitted for approval");
};

// LOG POST
logBtn.onclick = async () => {
  const user = auth.currentUser;
  if (!user) return alert("Login first");

  await addDoc(collection(db, "posts"), {
    type: "log",
    message: logInput.value,
    approved: false
  });

  alert("Log submitted");
};

// LOAD APPROVED POSTS
async function load() {
  const q = query(collection(db, "posts"), where("approved", "==", true));
  const snap = await getDocs(q);

  archiveContainer.innerHTML = "";
  logsContainer.innerHTML = "";

  snap.forEach(doc => {
    const d = doc.data();

    if (d.type === "image") {
      archiveContainer.innerHTML += <img src="${d.imageUrl}"><div class="caption">${d.caption}</div>;
    }

    if (d.type === "log") {
      logsContainer.innerHTML += <div class="log">${d.message}</div>;
    }
  });
}

load();
</script>

</body>
</html>
