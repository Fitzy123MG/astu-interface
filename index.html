<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTU Interface Final</title>

<style>
:root{
  --bg:#050507;
  --panel:#0c0c12;
  --border:#1f1f2a;
  --purple:#a970ff;
  --green:#00e6a3;
  --text:#e4e4e7;
  --muted:#9a9aa3;
}

@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');

*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'JetBrains Mono','Courier New',monospace;
}

button, .card, .title, .log, .caption {
  font-family:'JetBrains Mono','Courier New',monospace;
}

.container{max-width:900px;margin:auto;padding:18px}

.nav{display:flex;gap:8px;margin-bottom:18px}
.nav button{
  flex:1;padding:12px;border-radius:10px;
  border:1px solid var(--border);
  background:linear-gradient(to bottom,rgba(255,255,255,0.03),transparent);
  color:var(--muted);
}
.nav button.active{
  color:var(--purple);
  border-color:var(--purple);
  background:rgba(169,112,255,0.12);
}

.panel{display:none;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px}
.panel.active{display:block}

.title{color:var(--purple);font-size:12px;margin-bottom:10px}
.highlight{color:var(--green)}
.muted{color:var(--muted)}

.hero h1{margin:0;color:var(--green);font-size:22px}
.hero p{margin-top:6px;color:var(--muted)}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.card{border:1px solid var(--border);padding:14px;border-radius:10px;background:rgba(255,255,255,0.02)}

.section{margin-top:24px;padding-top:14px;border-top:1px solid var(--border)}

.bee{margin-top:50px;text-align:center;font-size:26px;opacity:0.8}

img{width:100%;border-radius:8px;margin-top:10px}
.caption{font-size:12px;color:var(--muted)}

.log{padding:8px 0;border-bottom:1px solid var(--border)}

textarea{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  background:#0a0a0a;
  color:#fff;
  border:1px solid var(--border);
}

/* FIXED ➕ button position */
.addBtn{
  display:block;
  margin-bottom:10px;
  width:40px;
  height:40px;
  border-radius:50%;
}
</style>
</head>

<body>

<div class="container">

<div class="nav">
  <button class="active" onclick="tab('home',this)">Home</button>
  <button onclick="tab('system',this)">System</button>
  <button onclick="tab('archive',this)">Archive</button>
  <button onclick="tab('logs',this)">Logs</button>
  <button onclick="tab('capsule',this)">Capsule</button>
  <button onclick="tab('profile',this)">Profile</button>
</div>

<div id="home" class="panel active">
  <div class="hero">
    <h1>ASTU MECHANICAL INTERFACE</h1>
    <p>Batch archive and final phase access system</p>
  </div>

  <div class="grid">
    <div class="card">SYSTEM: ACTIVE</div>
    <div class="card">ARCHIVE: MEMORY STORAGE</div>
    <div class="card">LOGS: MESSAGE RECORD</div>
    <div class="card">CAPSULE: LOCKED</div>
  </div>

  <div class="bee">🐝</div>
</div>

<div id="archive" class="panel">
  <div class="title">ARCHIVE</div>

  <button class="addBtn">+</button>

  <img src="final-match.jpg">
  <div class="caption">Final Match</div>

  <img src="field-trip.jpg">
  <div class="caption">Field Trip</div>
</div>

<div id="logs" class="panel">
  <div class="title">LOG ENTRIES</div>

  <textarea id="logInput" placeholder="Write a message..."></textarea>
  <button id="logBtn">POST</button>

  <div id="logsContainer">
    <div class="muted">wow, so empty...</div>
  </div>
</div>

<div id="capsule" class="panel">
  <div class="title">TIME CAPSULE</div>

  <button onclick="tryAccess()">UNLOCK</button>

  <div id="status" class="muted" style="margin-top:10px"></div>
  <div id="countdown" class="highlight" style="margin-top:6px"></div>

  <div id="content" style="display:none;margin-top:12px">
    <div>FINAL WEEK</div>
    <div>LATE NIGHTS</div>
    <div>WORKSHOP DAY</div>
  </div>
</div>

<div id="profile" class="panel">
  <div class="title">PROFILE</div>

  <div id="userInfo" class="highlight">NOT LOGGED IN</div>
  <div id="profileBox" style="margin-top:12px"></div>
</div>

</div>

<script>
function tab(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'))
  document.getElementById(id).classList.add('active')
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'))
  btn.classList.add('active')
}

const target=new Date("May 27, 2026 23:59:59").getTime()

function tryAccess(){
  const now=Date.now()
  const diff=target-now
  const status=document.getElementById('status')

  if(diff>0){
    status.innerHTML="ACCESS DENIED"
  } else {
    status.innerHTML="ACCESS GRANTED"
    document.getElementById('content').style.display='block'
  }
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { 
  getAuth, signInWithPopup, signOut,
  GoogleAuthProvider, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { 
  getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  authDomain: "astu-mechanical-portal.firebaseapp.com",
  projectId: "astu-mechanical-portal"
});

const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// AUTH UI
onAuthStateChanged(auth, (user) => {
  const box = document.getElementById("profileBox");
  const info = document.getElementById("userInfo");

  if(user){
    info.innerHTML = "USER: " + user.displayName;

    box.innerHTML = `<button id="logoutBtn">LOGOUT</button>`;
    document.getElementById("logoutBtn").onclick = ()=>signOut(auth);

  } else {
    info.innerHTML = "NOT LOGGED IN";

    box.innerHTML = `<button id="loginBtn">LOGIN</button>`;
    document.getElementById("loginBtn").onclick = ()=>signInWithPopup(auth, provider);
  }
});

// LOGS
document.getElementById("logBtn").onclick = async () => {
  const user = auth.currentUser;
  if (!user) return alert("Login first");

  const text = document.getElementById("logInput").value;
  if (!text.trim()) return;

  await addDoc(collection(db, "logs"), {
    text,
    user: user.displayName,
    uid: user.uid
  });

  logInput.value="";
  loadLogs();
};

async function loadLogs(){
  const snap = await getDocs(collection(db, "logs"));
  const container = document.getElementById("logsContainer");

  container.innerHTML = snap.empty
    ? `<div class="muted">wow, so empty...</div>`
    : "";

  snap.forEach(d=>{
    const data = d.data();
    const user = auth.currentUser;

    let controls = "";
    if(user && user.uid === data.uid){
      controls = `
        <button onclick="deleteLog('${d.id}')">X</button>
        <button onclick="editLog('${d.id}','${data.text}')">Edit</button>
      `;
    }

    container.innerHTML += `
      <div class="log">
        "${data.text}" — ${data.user}
        ${controls}
      </div>`;
  });
}

window.deleteLog = async (id)=>{
  await deleteDoc(doc(db,"logs",id));
  loadLogs();
};

window.editLog = async (id,oldText)=>{
  const newText = prompt("Edit message:", oldText);
  if(newText){
    await updateDoc(doc(db,"logs",id),{text:newText});
    loadLogs();
  }
};

loadLogs();
</script>

</body>
</html>
