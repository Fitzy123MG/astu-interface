<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTU Interface Final</title>

<style>
:root{
  --bg:#050507;
  --panel:#0c0c12;
  --border:#1f1f2a;
  --purple:#a970ff;
  --green:#00e6a3;
  --text:#e4e4e7;
  --muted:#9a9aa3;
}

@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');

*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'JetBrains Mono','Courier New',monospace;
}

button, .card, .title, .log, .caption {
  font-family:'JetBrains Mono','Courier New',monospace;
}

button{
  border-radius:10px;
  border:1px solid var(--border);
  background:linear-gradient(to bottom,rgba(255,255,255,0.03),transparent);
  color:var(--muted);
  padding:10px;
  cursor:pointer;
}
button:hover{
  color:var(--purple);
  border-color:var(--purple);
}

.container{max-width:900px;margin:auto;padding:18px}

.nav{display:flex;gap:8px;margin-bottom:18px}
.nav button{flex:1;padding:12px}
.nav button.active{
  color:var(--purple);
  border-color:var(--purple);
}

.panel{display:none;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px}
.panel.active{display:block}

.title{color:var(--purple);font-size:12px;margin-bottom:10px}
.highlight{color:var(--green)}
.muted{color:var(--muted)}

.hero h1{margin:0;color:var(--green);font-size:22px}
.hero p{margin-top:6px;color:var(--muted)}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.card{border:1px solid var(--border);padding:14px;border-radius:10px;background:rgba(255,255,255,0.02)}

.bee{margin-top:50px;text-align:center;font-size:26px;opacity:0.8}

img{width:100%;border-radius:8px;margin-top:10px}

.captionRow{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:var(--muted);
}

.iconBtn{
  float:right;
  cursor:pointer;
  opacity:0.6;
}
.iconBtn:hover{opacity:1;color:var(--purple)}

textarea{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  background:#0b0b11;
  color:var(--text);
  border:1px solid var(--border);
}
</style>
</head>

<body>

<div class="container">

<div class="nav">
  <button class="active" onclick="tab('home',this)">Home</button>
  <button onclick="tab('system',this)">System</button>
  <button onclick="tab('archive',this)">Archive</button>
  <button onclick="tab('logs',this)">Logs</button>
  <button onclick="tab('capsule',this)">Capsule</button>
  <button onclick="tab('profile',this)">Profile</button>
</div>

<div id="home" class="panel active">
  <div class="hero">
    <h1>ASTU MECHANICAL INTERFACE</h1>
    <p>Batch archive and final phase access system</p>
  </div>
  <div class="grid">
    <div class="card">SYSTEM: ACTIVE</div>
    <div class="card">ARCHIVE: STORAGE</div>
    <div class="card">LOGS: RECORD</div>
    <div class="card">CAPSULE: LOCKED</div>
  </div>
  <div class="bee">🐝</div>
</div>

<div id="archive" class="panel">
  <div class="title">ARCHIVE</div>

  <input type="file" id="imageInput" hidden>
  <button id="uploadBtn">+ Add Photo</button>

  <textarea id="captionInput" style="display:none"></textarea>
  <button id="postImageBtn" style="display:none">POST</button>
  <div id="uploadStatus"></div>

  <div id="archiveContainer"></div>
</div>

<div id="logs" class="panel">
  <div class="title">LOG ENTRIES</div>

  <textarea id="logInput"></textarea>
  <button id="logBtn">POST</button>
  <button id="deleteBtn" style="display:none">DELETE</button>

  <div id="logsContainer"></div>
</div>

<div id="capsule" class="panel">
  <div class="title">TIME CAPSULE</div>
  <button onclick="tryAccess()">UNLOCK</button>
  <div id="status"></div>
  <div id="countdown"></div>
</div>

<div id="profile" class="panel">
  <div id="userInfo">NOT LOGGED IN</div>
  <button id="loginBtn">LOGIN</button>
  <button id="logoutBtn" style="display:none">LOGOUT</button>
</div>

</div>

<script>
function tab(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'))
  document.getElementById(id).classList.add('active')
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithPopup, signOut, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  authDomain: "astu-mechanical-portal.firebaseapp.com",
  projectId: "astu-mechanical-portal"
});

const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

loginBtn.onclick = () => signInWithPopup(auth, provider);
logoutBtn.onclick = () => signOut(auth);

onAuthStateChanged(auth, (user)=>{
  userInfo.innerHTML = user ? "USER: "+user.displayName : "NOT LOGGED IN";
  loginBtn.style.display = user ? "none":"block";
  logoutBtn.style.display = user ? "block":"none";
  loadLogs();
  loadArchive();
});

// LOGS
logBtn.onclick = async ()=>{
  if(!auth.currentUser) return alert("Login first");

  await addDoc(collection(db,"logs"),{
    text:logInput.value,
    user:auth.currentUser.displayName,
    uid:auth.currentUser.uid
  });

  logInput.value="";
  loadLogs();
};

async function loadLogs(){
  const snap = await getDocs(collection(db,"logs"));
  logsContainer.innerHTML="";

  snap.forEach(d=>{
    const data=d.data();
    let action="";

    if(auth.currentUser && data.uid===auth.currentUser.uid){
      action=`<span class="iconBtn" onclick="editLog('${d.id}','${data.text}')">✎</span>`;
    } else {
      action=`<span class="iconBtn">!</span>`;
    }

    logsContainer.innerHTML+=`
      <div class="log">"${data.text}" — ${data.user}${action}</div>
    `;
  });
}

// ARCHIVE
uploadBtn.onclick=()=>{
  if(!auth.currentUser) return alert("Login first");
  imageInput.click();
};

imageInput.onchange=()=>{
  captionInput.style.display="block";
  postImageBtn.style.display="block";
};

postImageBtn.onclick=async()=>{
  uploadStatus.innerHTML="Uploading...";
  postImageBtn.style.display="none";

  const fd=new FormData();
  fd.append("file",imageInput.files[0]);
  fd.append("upload_preset","astu_upload");

  try{
    const res=await fetch("https://api.cloudinary.com/v1_1/djo2lhxqm/image/upload",{method:"POST",body:fd});
    const data=await res.json();

    await addDoc(collection(db,"archive"),{
      image:data.secure_url,
      caption:captionInput.value,
      user:auth.currentUser.displayName,
      uid:auth.currentUser.uid
    });

    uploadStatus.innerHTML="";
    captionInput.style.display="none";
    loadArchive();
  }catch{
    uploadStatus.innerHTML="Upload failed!";
    postImageBtn.style.display="block";
  }
};

async function loadArchive(){
  const snap=await getDocs(collection(db,"archive"));
  archiveContainer.innerHTML="";

  snap.forEach(d=>{
    const data=d.data();
    let action="";

    if(auth.currentUser && data.uid===auth.currentUser.uid){
      action=`<span class="iconBtn">✎</span>`;
    }

    archiveContainer.innerHTML+=`
      <img src="${data.image}">
      <div class="captionRow">
        <span>${data.caption}</span>
        <span>${data.user}</span>
      </div>
      ${action}
    `;
  });
}
</script>

</body>
</html>
