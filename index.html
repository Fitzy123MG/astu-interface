<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTU Interface Final</title>

<style>
:root{
  --bg:#050507;
  --panel:#0c0c12;
  --border:#1f1f2a;
  --purple:#a970ff;
  --green:#00e6a3;
  --text:#e4e4e7;
  --muted:#9a9aa3;
}

@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');

*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'JetBrains Mono','Courier New',monospace;
}

button{
  border-radius:10px;
  border:1px solid var(--border);
  background:linear-gradient(to bottom,rgba(255,255,255,0.03),transparent);
  color:var(--muted);
  padding:10px;
  cursor:pointer;
}
button:hover{
  color:var(--purple);
  border-color:var(--purple);
}

.container{max-width:900px;margin:auto;padding:18px}

.panel{display:none}
.panel.active{display:block}

img{width:100%;border-radius:8px;margin-top:10px;cursor:pointer}

/* ARCHIVE ONLY ADDITIONS */
.archiveItem{position:relative;}

.editIcon{
  position:absolute;
  top:10px;
  right:10px;
  opacity:0;
  cursor:pointer;
}
.archiveItem:hover .editIcon{opacity:1;}

.captionRow{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:#9a9aa3;
  margin-bottom:10px;
}

.fullscreen{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}
.fullscreen img{
  max-width:90%;
  max-height:90%;
}
</style>
</head>

<body>

<div class="container">

<!-- KEEP YOUR ORIGINAL UI -->
<div id="archive" class="panel active">

<input type="file" id="imageInput" style="display:none">
<button id="uploadBtn">+ Add Photo</button>

<textarea id="captionInput" style="display:none"></textarea>
<button id="postImageBtn" style="display:none">POST</button>

<div id="uploadStatus"></div>
<div id="archiveContainer"></div>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"astu-mechanical-portal.firebaseapp.com",
  projectId:"astu-mechanical-portal"
});

const auth=getAuth(app);
const db=getFirestore(app);
const provider=new GoogleAuthProvider();

const uploadBtn=document.getElementById("uploadBtn");
const imageInput=document.getElementById("imageInput");
const captionInput=document.getElementById("captionInput");
const postImageBtn=document.getElementById("postImageBtn");
const uploadStatus=document.getElementById("uploadStatus");

let selectedFile=null;

uploadBtn.onclick=()=>{
  if(!auth.currentUser) return alert("Login first");
  imageInput.click();
};

imageInput.onchange=()=>{
  selectedFile=imageInput.files[0];
  if(!selectedFile) return;

  captionInput.style.display="block";
  postImageBtn.style.display="block";
};

postImageBtn.onclick=async()=>{
  if(!selectedFile) return;

  uploadStatus.innerHTML="Uploading...";
  postImageBtn.disabled=true;

  const fd=new FormData();
  fd.append("file",selectedFile);
  fd.append("upload_preset","astu_upload");

  const res=await fetch("https://api.cloudinary.com/v1_1/djo2lhxqm/image/upload",{method:"POST",body:fd});
  const data=await res.json();

  await addDoc(collection(db,"archive"),{
    image:data.secure_url,
    caption:captionInput.value||"",
    user:auth.currentUser.displayName,
    uid:auth.currentUser.uid
  });

  uploadStatus.innerHTML="";
  postImageBtn.disabled=false;

  captionInput.style.display="none";
  postImageBtn.style.display="none";
  captionInput.value="";
  selectedFile=null;

  loadArchive();
};

function openFullscreen(src){
  const div=document.createElement("div");
  div.className="fullscreen";
  div.innerHTML=`<img src="${src}">`;
  div.onclick=()=>div.remove();
  document.body.appendChild(div);
}

async function loadArchive(){
  const snap=await getDocs(collection(db,"archive"));
  archiveContainer.innerHTML="";

  if(snap.empty){
    archiveContainer.innerHTML="<div>wow, so empty...</div>";
    return;
  }

  snap.forEach(d=>{
    const data=d.data();
    const isOwner=auth.currentUser && auth.currentUser.uid===data.uid;

    archiveContainer.innerHTML+=`
    <div class="archiveItem">

      ${isOwner ? `<div class="editIcon" onclick="editPost('${d.id}')">✎</div>` : ""}

      <img src="${data.image}" onclick="openFullscreen('${data.image}')">

      <div id="view-${d.id}">
        <div class="captionRow">
          <span>${data.caption||""}</span>
          <span>${data.user}</span>
        </div>
      </div>

      <div id="edit-${d.id}" style="display:none">
        <textarea id="editInput-${d.id}">${data.caption||""}</textarea>
        <button onclick="saveEdit('${d.id}')">SAVE</button>
        <button onclick="deletePost('${d.id}')">DELETE POST</button>
      </div>

    </div>`;
  });
}

window.editPost=(id)=>{
  document.getElementById(`view-${id}`).style.display="none";
  document.getElementById(`edit-${id}`).style.display="block";
};

window.saveEdit=async(id)=>{
  const val=document.getElementById(`editInput-${id}`).value;
  await updateDoc(doc(db,"archive",id),{caption:val});
  loadArchive();
};

window.deletePost=async(id)=>{
  await deleteDoc(doc(db,"archive",id));
  loadArchive();
};

onAuthStateChanged(auth,loadArchive);
</script>

</body>
</html>
