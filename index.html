<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTU Interface Final</title>

<style>
:root{
  --bg:#050507;
  --panel:#0c0c12;
  --border:#1f1f2a;
  --purple:#a970ff;
  --green:#00e6a3;
  --text:#e4e4e7;
  --muted:#9a9aa3;
}

@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');

*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'JetBrains Mono','Courier New',monospace;
}

button, .card, .title, .log, .caption {
  font-family:'JetBrains Mono','Courier New',monospace;
}

button{
  border-radius:10px;
  border:1px solid var(--border);
  background:linear-gradient(to bottom,rgba(255,255,255,0.03),transparent);
  color:var(--muted);
  padding:10px;
  transition:0.2s;
  cursor:pointer;
}
button:hover{
  color:var(--purple);
  border-color:var(--purple);
  background:rgba(169,112,255,0.12);
}

.container{max-width:900px;margin:auto;padding:18px}

.nav{display:flex;gap:8px;margin-bottom:18px}
.nav button{
  flex:1;padding:12px;
}
.nav button.active{
  color:var(--purple);
  border-color:var(--purple);
  background:rgba(169,112,255,0.12);
}

.panel{display:none;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px}
.panel.active{display:block}

.title{color:var(--purple);font-size:12px;margin-bottom:10px}
.highlight{color:var(--green)}
.muted{color:var(--muted)}

.hero h1{margin:0;color:var(--green);font-size:22px}
.hero p{margin-top:6px;color:var(--muted)}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.card{border:1px solid var(--border);padding:14px;border-radius:10px;background:rgba(255,255,255,0.02)}
.card .label{color:var(--purple);font-size:12px}
.card .value{color:var(--green);font-size:13px;margin-top:4px}

.bee{margin-top:50px;text-align:center;font-size:26px;opacity:0.8}

img{width:100%;border-radius:8px;margin-top:10px;cursor:pointer}

.captionRow{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:var(--muted);
  margin-bottom:8px;
}

.iconBtn{
  float:right;
  cursor:pointer;
  opacity:0.6;
}
.iconBtn:hover{
  opacity:1;
  color:var(--purple);
}

#uploadBtn{
  float:right;
  margin-top:-28px;
}
</style>
</head>

<body>

<div class="container">

<div class="nav">
  <button class="active" onclick="tab('home',this)">Home</button>
  <button onclick="tab('system',this)">System</button>
  <button onclick="tab('archive',this)">Archive</button>
  <button onclick="tab('logs',this)">Logs</button>
  <button onclick="tab('capsule',this)">Capsule</button>
  <button onclick="tab('profile',this)">Profile</button>
</div>

<div id="home" class="panel active">
  <div class="hero">
    <h1>ASTU MECHANICAL INTERFACE</h1>
    <p>Batch archive and final phase access system</p>
  </div>
  <div class="grid">
    <div class="card"><div class="label">SYSTEM</div><div class="value">STATUS: ACTIVE</div></div>
    <div class="card"><div class="label">ARCHIVE</div><div class="value">MEMORY STORAGE</div></div>
    <div class="card"><div class="label">LOGS</div><div class="value">MESSAGE RECORD</div></div>
    <div class="card"><div class="label">CAPSULE</div><div class="value">LOCKED</div></div>
  </div>
  <div class="bee">🐝</div>
</div>

<div id="system" class="panel">
  <div class="title">SYSTEM STATUS</div>
  <div class="highlight">UNIVERSITY COMPLETION: 50%</div>
  <div class="muted">COHORT: ASTU MECHANICAL 2026</div>
  <div class="muted">STATUS: FINAL PHASE</div>
</div>

<div id="archive" class="panel">
  <div class="title">ARCHIVE</div>

  <input type="file" id="imageInput" style="display:none" accept="image/*">
  <button id="uploadBtn">+ Add Photo</button>

  <textarea id="captionInput" placeholder="Add caption (optional)..." style="display:none"></textarea>
  <button id="postImageBtn" style="display:none;margin-top:8px;">POST</button>

  <div id="uploadStatus" class="muted"></div>

  <div id="archiveContainer"></div>
</div>

</div>

<script>
function tab(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'))
  document.getElementById(id).classList.add('active')
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'))
  btn.classList.add('active')
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithPopup, signOut, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  authDomain: "...",
  projectId: "..."
});

const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

const uploadBtn = document.getElementById("uploadBtn");
const imageInput = document.getElementById("imageInput");
const captionInput = document.getElementById("captionInput");
const postImageBtn = document.getElementById("postImageBtn");
const uploadStatus = document.getElementById("uploadStatus");
const archiveContainer = document.getElementById("archiveContainer");

let selectedFile=null;

uploadBtn.onclick=()=>{
  if(!auth.currentUser) return alert("Login first");
  imageInput.click();
};

imageInput.onchange=()=>{
  selectedFile=imageInput.files[0];
  if(!selectedFile) return;

  captionInput.style.display="block";
  postImageBtn.style.display="block";
};

postImageBtn.onclick=async ()=>{
  if(!selectedFile) return;

  postImageBtn.style.display="none";
  uploadStatus.innerHTML="Uploading...";

  const formData=new FormData();
  formData.append("file",selectedFile);
  formData.append("upload_preset","astu_upload");

  const res=await fetch("https://api.cloudinary.com/v1_1/djo2lhxqm/image/upload",{method:"POST",body:formData});
  const data=await res.json();

  await addDoc(collection(db,"archive"),{
    image:data.secure_url,
    caption:captionInput.value||"",
    user:auth.currentUser.displayName,
    uid:auth.currentUser.uid
  });

  uploadStatus.innerHTML="";
  captionInput.value="";
  captionInput.style.display="none";
  selectedFile=null;

  loadArchive();
};

window.editPost=(id,oldCaption)=>{
  const box=document.getElementById("edit-"+id);
  box.style.display="block";
  box.querySelector("textarea").value=oldCaption;
};

window.saveEdit=async(id)=>{
  const text=document.getElementById("editText-"+id).value;
  await updateDoc(doc(db,"archive",id),{caption:text});
  loadArchive();
};

window.deletePost=async(id)=>{
  await deleteDoc(doc(db,"archive",id));
  loadArchive();
};

async function loadArchive(){
  const snap=await getDocs(collection(db,"archive"));
  archiveContainer.innerHTML="";

  if(snap.empty){
    archiveContainer.innerHTML=`<div class="muted">wow, so empty...</div>`;
    return;
  }

  snap.forEach(d=>{
    const data=d.data();
    const isOwner=auth.currentUser && auth.currentUser.uid===data.uid;

    archiveContainer.innerHTML+=`
      <div>
        <img src="${data.image}" onclick="window.open('${data.image}','_blank')">
        
        <div class="captionRow">
          <span>${data.caption||""}</span>
          <span>${data.user}</span>
        </div>

        ${isOwner ? `
          <span class="iconBtn" onclick="editPost('${d.id}','${data.caption}')">✎</span>

          <div id="edit-${d.id}" style="display:none;margin-top:8px;">
            <textarea id="editText-${d.id}"></textarea>
            <button onclick="saveEdit('${d.id}')">Save</button>
            <button onclick="deletePost('${d.id}')">Delete</button>
          </div>
        ` : ``}
      </div>
    `;
  });
}

onAuthStateChanged(auth,()=>{
  loadArchive();
});
</script>

</body>
</html>
